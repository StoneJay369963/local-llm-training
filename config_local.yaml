# ============================================
# LocalLLMTraining 配置文件 - Qwen3.5 4B 本地模型
# ============================================

# 项目路径配置
paths:
  project_root: .
  data_dir: ./data
  model_dir: ./models
  log_dir: ./logs
  cache_dir: ./cache
  output_dir: ./output

# 硬件配置 - 使用 CPU (RTX 5060 CUDA 不兼容时)
hardware:
  device: cpu
  num_gpus: 0
  gradient_checkpointing: false

# 训练模式: lora
training:
  mode: lora
  output_dir: ./output
  num_train_epochs: 1
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 4
  learning_rate: 0.0002
  weight_decay: 0.01
  warmup_ratio: 0.03
  lr_scheduler_type: cosine
  logging_steps: 10
  save_steps: 100
  eval_steps: 100
  save_total_limit: 3
  fp16: false
  bf16: false
  max_grad_norm: 0.3

# 数据配置
dataset:
  format: json
  max_samples: 100
  test_size: 0.1

# 分词器配置
tokenizer:
  max_length: 512
  padding: max_length
  truncation: true
  add_special_tokens: true

# LoRA配置 - Qwen 适用
lora:
  r: 8
  lora_alpha: 16
  lora_dropout: 0.05
  target_modules:
    - q_proj
    - v_proj
    - k_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
  bias: none
  task_type: CAUSAL_LM

# 量化配置
quantization:
  enable: false
  load_in_4bit: false
  load_in_8bit: false

# 微调模型配置 - 本地 Qwen 模型
finetune_model:
  name_or_path: D:\.openclaw\workspace\local-llm-training\models\Qwen3.5_4B
  trust_remote_code: true

# 预训练模型配置
model:
  vocab_size: 151936
  hidden_size: 2560
  num_hidden_layers: 28
  num_attention_heads: 20
  intermediate_size: 6912

# 云端训练配置
cloud_training:
  enable: false
